name: Release Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for patch bump, or specify "minor" or "major")'
        required: false
        default: 'patch'
      dry_run:
        description: 'Dry run (skip publishing)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  check_version_change:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check_version
        run: |
          # Get current package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Get previous package.json
          git checkout HEAD~1 package.json
          PREVIOUS_VERSION=$(node -p "require('./package.json').version")
          git checkout HEAD package.json
          
          # Compare versions
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: [check_version_change]
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.check_version_change.outputs.version_changed == 'true'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Bump version
        id: bump-version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION_TYPE="${{ github.event.inputs.version }}"
          if [ -z "$VERSION_TYPE" ] || [ "$VERSION_TYPE" = "patch" ]; then
            npm version patch --no-git-tag-version
          elif [ "$VERSION_TYPE" = "minor" ]; then
            npm version minor --no-git-tag-version
          elif [ "$VERSION_TYPE" = "major" ]; then
            npm version major --no-git-tag-version
          else
            npm version $VERSION_TYPE --no-git-tag-version
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New version: $NEW_VERSION"

      - name: Set version from commit
        if: github.event_name == 'push'
        run: |
          echo "NEW_VERSION=${{ needs.check_version_change.outputs.new_version }}" >> $GITHUB_ENV
          echo "Using version from commit: ${{ needs.check_version_change.outputs.new_version }}"

      - name: Build extension
        run: npm run package

      - name: Package extension
        run: vsce package

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: wendy-vscode-${{ env.NEW_VERSION }}.vsix
          retention-days: 7

      - name: Publish to VS Code Marketplace
        if: ${{ !inputs.dry_run }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --packagePath wendy-vscode-${{ env.NEW_VERSION }}.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX Registry
        if: ${{ !inputs.dry_run }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish wendy-vscode-${{ env.NEW_VERSION }}.vsix --pat "$OVSX_PAT"

      - name: Display dry run info
        if: ${{ inputs.dry_run }}
        run: |
          echo "======================================================"
          echo "DRY RUN - VSIX file has been packaged successfully!"
          echo "Version: ${{ env.NEW_VERSION }}"
          echo "Skipped publishing to VS Code Marketplace and Open VSX"
          echo "======================================================"

      - name: Display success
        if: ${{ !inputs.dry_run }}
        run: |
          echo "======================================================"
          echo "✅ Extension published successfully!"
          echo "Version: ${{ env.NEW_VERSION }}"
          echo ""
          echo "Published to:"
          echo "  - VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=wendylabsinc.wendy-vscode"
          echo "  - Open VSX Registry: https://open-vsx.org/extension/wendylabsinc/wendy-vscode"
          echo "======================================================"

      - name: Notify Discord
        if: ${{ !inputs.dry_run }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
        run: |
          VERSION="${{ env.NEW_VERSION }}"
          MARKETPLACE_URL="https://marketplace.visualstudio.com/items?itemName=wendylabsinc.wendy-vscode"
          OPENVSX_URL="https://open-vsx.org/extension/wendylabsinc/wendy-vscode"

          DESCRIPTION="Install from the [VS Code Marketplace](${MARKETPLACE_URL}) or [Open VSX Registry](${OPENVSX_URL})."
          ESCAPED_DESC=$(echo "$DESCRIPTION" | jq -Rs .)

          cat > /tmp/discord_payload.json << PAYLOAD_EOF
          {
            "content": "🧩 **New VS Code extension release**: **v${VERSION}**",
            "embeds": [
              {
                "title": "Wendy VS Code Extension v${VERSION}",
                "url": "${MARKETPLACE_URL}",
                "description": ${ESCAPED_DESC},
                "color": 5814783,
                "footer": { "text": "wendylabsinc/wendy-vscode • v${VERSION}" }
              }
            ]
          }
          PAYLOAD_EOF

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -X POST -H "Content-Type: application/json" \
              -d @/tmp/discord_payload.json \
              "$DISCORD_WEBHOOK_URL" && echo "Discord notification sent" || echo "Discord notification failed"
          else
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
          fi 